<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interaktives Vokabel-Matching</title>
    
    <!-- Touch-Polyfill für reibungsloses Drag & Drop auf Smartphones/Tablets -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/drag-drop-touch/1.14.0/drag-drop-touch.min.js"></script>

    <style>
        :root {
            --primary-color: #4a90e2;
            --success-color: #2ecc71;
            --neutral-bg: #f5f7fa;
            --text-color: #333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--neutral-bg);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: #ffffff;
            width: 100%;
            max-width: 600px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h2 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 1.5rem;
        }

        .instruction {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        /* Flexbox-Layout für Desktop, wechselt zu Spalten auf Mobilgeräten */
        .game-zone {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            gap: 20px;
        }

        .column {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .draggable {
            background-color: var(--primary-color);
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: grab;
            user-select: none;
            transition: transform 0.2s, opacity 0.2s;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
        }

        .draggable:active {
            cursor: grabbing;
            transform: scale(0.98);
        }

        .dropzone {
            background-color: #fff;
            border: 2px dashed #cbd5e1;
            color: #475569;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: background-color 0.2s, border-color 0.2s;
        }

        .dropzone.drag-over {
            background-color: #e2e8f0;
            border-color: var(--primary-color);
        }

        .dropzone.correct {
            background-color: #e8f8f0;
            border-color: var(--success-color);
            color: #1e7e34;
            border-style: solid;
        }

        .dropzone .translation {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .dropzone .matched-word {
            font-size: 0.9rem;
            background: rgba(46, 204, 113, 0.15);
            padding: 4px 10px;
            border-radius: 20px;
            margin-top: 5px;
            font-weight: bold;
        }

        /* Feedback-Bereich am Ende */
        .footer-zone {
            text-align: center;
            margin-top: 30px;
        }

        .result-message {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--success-color);
            margin-bottom: 15px;
            display: none;
        }

        /* Responsiver Button */
        .btn-reset {
            background-color: #34495e;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .btn-reset:hover {
            background-color: #2c3e50;
        }

        .btn-reset:active {
            transform: scale(0.98);
        }

        /* RESPONSIVE DESIGN (Tablets und Smartphones) */
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }

            .container {
                padding: 20px;
            }

            .game-zone {
                flex-direction: column;
                gap: 30px;
            }

            h2 {
                font-size: 1.3rem;
            }

            .draggable {
                padding: 12px;
                font-size: 1rem;
            }

            .dropzone {
                padding: 15px;
                min-height: 70px;
            }

            .btn-reset {
                width: 100%; /* Volle Breite auf Smartphones für leichtere Bedienung */
                padding: 14px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Vokabel-Matching</h2>
    <p class="instruction">Ziehe die russischen Begriffe auf die richtige deutsche Bedeutung.</p>

    <div class="game-zone">
        <!-- Linke Spalte: Russische Wörter (Ziehbar) -->
        <div class="column" id="words-column">
            <!-- Wird via JavaScript befüllt -->
        </div>

        <!-- Rechte Spalte: Deutsche Bedeutungen (Ziele) -->
        <div class="column">
            <div class="dropzone" data-accept="blin">
                <span class="translation">„Mist“</span>
            </div>
            <div class="dropzone" data-accept="zakon">
                <span class="translation">„Murphys Gesetz“</span>
            </div>
        </div>
    </div>

    <div class="footer-zone">
        <div class="result-message" id="success-msg">
            🎉 Ausgezeichnet! Alles richtig zugeordnet.
        </div>
        <button class="btn-reset" id="reset-btn">Neustart</button>
    </div>
</div>

<script>
    // Ausgangsdaten für die ziehbaren Elemente
    const initialWords = [
        { id: 'word-zakon', match: 'zakon', text: 'Закон подлости' },
        { id: 'word-blin', match: 'blin', text: 'Блин' }
    ];

    const wordsColumn = document.getElementById('words-column');
    const dropzones = document.querySelectorAll('.dropzone');
    const successMsg = document.getElementById('success-msg');
    const resetBtn = document.getElementById('reset-btn');
    
    let totalMatches = 0;

    // Funktion zum Initialisieren und Mischen des Spiels
    function initGame() {
        // 1. Zurücksetzen der Variablen und Ansichten
        totalMatches = 0;
        successMsg.style.display = 'none';
        wordsColumn.innerHTML = '';
        
        dropzones.forEach(zone => {
            zone.classList.remove('correct', 'drag-over');
            // Entferne alte Badges, behalte nur den Übersetzungstext
            const matchedBadge = zone.querySelector('.matched-word');
            if (matchedBadge) matchedBadge.remove();
        });

        // 2. Wörter zufällig mischen (Fisher-Yates Shuffle)
        const shuffledWords = [...initialWords];
        for (let i = shuffledWords.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffledWords[i], shuffledWords[j]] = [shuffledWords[j], shuffledWords[i]];
        }

        // 3. Elemente dynamisch erzeugen und Event-Listener binden
        shuffledWords.forEach(word => {
            const div = document.createElement('div');
            div.className = 'draggable';
            div.draggable = true;
            div.id = word.id;
            div.setAttribute('data-match', word.match);
            div.innerText = word.text;

            // Drag-Start
            div.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('text/plain', e.target.id);
                setTimeout(() => { e.target.style.opacity = '0.4'; }, 0);
            });

            // Drag-End
            div.addEventListener('dragend', (e) => {
                e.target.style.opacity = '1';
            });

            wordsColumn.appendChild(div);
        });
    }

    // Dropzone Event-Listener (einmalig binden)
    dropzones.forEach(dropzone => {
        dropzone.addEventListener('dragover', (e) => {
            e.preventDefault();
            if (!dropzone.classList.contains('correct')) {
                dropzone.classList.add('drag-over');
            }
        });

        dropzone.addEventListener('dragleave', () => {
            dropzone.classList.remove('drag-over');
        });

        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('drag-over');

            const draggedId = e.dataTransfer.getData('text/plain');
            const draggedElement = document.getElementById(draggedId);
            
            if (!draggedElement) return;

            const wordType = draggedElement.getAttribute('data-match');
            const zoneType = dropzone.getAttribute('data-accept');

            if (wordType === zoneType) {
                dropzone.classList.add('correct');
                
                const badge = document.createElement('span');
                badge.classList.add('matched-word');
                badge.innerText = draggedElement.innerText;
                dropzone.appendChild(badge);

                draggedElement.remove();
                totalMatches++;
                
                if (totalMatches === initialWords.length) {
                    successMsg.style.display = 'block';
                }
            } else {
                // Falsches Feedback (rotes Aufblinken)
                dropzone.style.borderColor = '#e74c3c';
                dropzone.style.backgroundColor = '#fdedec';
                setTimeout(() => {
                    if (!dropzone.classList.contains('correct')) {
                        dropzone.style.borderColor = '#cbd5e1';
                        dropzone.style.backgroundColor = '#fff';
                    }
                }, 500);
            }
        });
    });

    // Event-Listener für den Neustart-Button
    resetBtn.addEventListener('click', initGame);

    // Spiel beim ersten Laden starten
    initGame();
</script>

</body>
</html>
